name: Secret Scan

# Fails the build if a secret is committed. Scans full history on push and the
# PR diff on pull_request. Never uploads raw secrets as artifacts.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml
          # Redact secret values from the action's output/logs.
          GITLEAKS_ENABLE_SUMMARY: "true"
