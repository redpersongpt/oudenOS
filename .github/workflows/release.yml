name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, for example v1.0.2"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish OudenOS
    runs-on: windows-latest
    timeout-minutes: 45
    outputs:
      tag: ${{ steps.version.outputs.TAG }}
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if (-not $tag) {
            $tag = "${{ github.ref_name }}"
          }

          $pkgVersion = node -p "require('./apps/os-desktop/package.json').version"
          $expectedTag = "v$pkgVersion"
          if ($tag -ne $expectedTag) {
            throw "Release tag $tag does not match apps/os-desktop version $pkgVersion"
          }

          "TAG=$tag" >> $env:GITHUB_OUTPUT
          "VERSION=$pkgVersion" >> $env:GITHUB_OUTPUT

      - name: Run release checks
        shell: bash
        run: |
          pnpm build:os:sources
          pnpm --dir apps/os-desktop audit:questionnaire
          pnpm --filter @oudenos/os-desktop typecheck

      - name: Build OS service
        working-directory: services/os-service
        run: cargo build --release

      - name: Build renderer
        working-directory: apps/os-desktop
        run: pnpm build

      - name: Build Tauri installer
        working-directory: apps/os-desktop
        env:
          # Required: production builds create signed updater artifacts.
          # Add these in the repo's Actions secrets (see docs/UPDATER.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri:build

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "apps/os-desktop/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS installer found"
          }

          New-Item -ItemType Directory -Path "apps/os-desktop/dist/installers" -Force | Out-Null
          $stableName = "oudenOS-setup-${{ steps.version.outputs.VERSION }}.exe"
          $stablePath = "apps/os-desktop/dist/installers/$stableName"
          Copy-Item $installer.FullName $stablePath

          $size = (Get-Item $stablePath).Length
          if ($size -lt 2000000) {
            throw "Installer too small: $size bytes"
          }

          $sha = (Get-FileHash $stablePath -Algorithm SHA256).Hash.ToLower()
          "ASSET_PATH=$stablePath" >> $env:GITHUB_OUTPUT
          "ASSET_NAME=$stableName" >> $env:GITHUB_OUTPUT
          "SHA256=$sha" >> $env:GITHUB_OUTPUT
          "SIZE=$size" >> $env:GITHUB_OUTPUT

          # Updater feed: createUpdaterArtifacts emits a .sig next to the
          # installer. The signature is over the file bytes, so the rename above
          # doesn't invalidate it. Build latest.json pointing at the published
          # asset URL so the in-app updater can verify + install.
          $sig = Get-ChildItem -Path "apps/os-desktop/src-tauri/target/release/bundle/nsis/*.sig" | Select-Object -First 1
          if (-not $sig) {
            throw "No updater .sig found — is TAURI_SIGNING_PRIVATE_KEY set in Actions secrets?"
          }
          $sigContent = (Get-Content $sig.FullName -Raw).Trim()
          $downloadUrl = "https://github.com/redpersongpt/oudenOS/releases/download/${{ steps.version.outputs.TAG }}/$stableName"
          $latest = [ordered]@{
            version   = "${{ steps.version.outputs.VERSION }}"
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{ signature = $sigContent; url = $downloadUrl }
            }
          }
          $latestPath = "apps/os-desktop/dist/installers/latest.json"
          $latest | ConvertTo-Json -Depth 6 | Set-Content -Path $latestPath -Encoding utf8
          "LATEST_PATH=$latestPath" >> $env:GITHUB_OUTPUT

      - name: Create release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'NOTES'
          Critical fix. Update from any earlier version.

          - Removed two GPU tweaks that could leave the machine on a black screen with only a cursor after the next reboot (recoverable only via System Restore): "Enable GPU MSI mode" and "Lock NVIDIA P-State 0". Forcing MSI mode can stop the GPU driver from loading on some hardware, dropping Windows to the basic display adapter. These are gone from the catalog entirely — the few microseconds of latency were never worth an unbootable desktop.
          - Fixed Turkish: the setup questions were showing in English even in Turkish mode. The whole questionnaire now translates.

          If a previous version left you on a black screen: boot into Recovery → System Restore, or Safe Boot and run the rollback from the activity log.

          macOS users: the attached .dmg is a non-functional preview — the same screens and questions as the Windows app, but it never changes your Mac.
          NOTES

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: OudenOS ${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.asset.outputs.ASSET_PATH }}
            ${{ steps.asset.outputs.LATEST_PATH }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, 'alpha') || contains(steps.version.outputs.TAG, 'beta') || contains(steps.version.outputs.TAG, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # macOS demo build. The Mac app is a NON-FUNCTIONAL preview: its UI and
  # questionnaire are 1:1 with the Windows app, but it never changes the system
  # (the privileged service runs in simulated mode on non-Windows hosts). We ship
  # it on every release so Mac users can see exactly what the app looks like.
  macos-demo:
    name: Build and attach macOS demo DMG
    needs: release
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build OS service (macOS, simulated backend)
        working-directory: services/os-service
        env:
          CARGO_TARGET_DIR: target-mac
        run: cargo build --release

      - name: Build renderer
        run: pnpm --dir apps/os-desktop build

      - name: Build macOS .app
        # App bundle only — the dmg target's bundle_dmg.sh uses AppleScript to
        # lay out the disk-image window, which fails on headless CI runners.
        run: pnpm --dir apps/os-desktop exec tauri build --config src-tauri/tauri.conf.mac.json --bundles app

      - name: Package and attach DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          APP="apps/os-desktop/src-tauri/target/release/bundle/macos/OudenOS.app"
          if [ ! -d "$APP" ]; then
            echo "App bundle not found at $APP"
            exit 1
          fi
          DMG="oudenOS-${VERSION}-macOS-demo-AppleSilicon.dmg"
          hdiutil create -volname "oudenOS demo" -srcfolder "$APP" -ov -format UDZO "$DMG"
          ls -lh "$DMG"
          gh release upload "$TAG" "$DMG" --clobber
