# Performance: Storage Optimization

module: performance.storage
name: "Storage Optimization"
description: "Optimize storage performance: disable NTFS last access timestamps, 8.3 filenames, enable write caching, and disable search indexing"
category: performance

actions:
  - id: storage.disable-last-access
    name: "Disable NTFS Last Access Timestamp"
    description: "Stop NTFS from writing a last-access timestamp every time a file is read (System-Managed, Last Access Disabled — fsutil flag 0x80000001). This is the single owner of this setting; reversible."
    rationale: "By default NTFS updates LastAccessTime on every file read, generating constant small writes. Disabling it removes that write I/O. (Uses the System-Managed/Disabled value 0x80000001 so it agrees with the NTFS optimization action instead of writing a conflicting value to the same key.)"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\FileSystem"
        valueName: NtfsDisableLastAccessUpdate
        value: 2147483649
        valueType: DWord

  - id: storage.enable-write-caching
    name: "Enable Disk Write Caching"
    description: "Enable write caching on storage devices, allowing the OS to buffer writes in RAM before flushing to disk for improved I/O throughput"
    rationale: "Write caching allows the storage driver to acknowledge writes before they reach the physical media, dramatically improving random write performance."
    risk: low
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 3
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Enum\\SCSI\\<device>\\<instance>\\Device Parameters\\Disk"
        valueName: UserWriteCacheSetting
        value: 1
        valueType: DWord
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Enum\\SCSI\\<device>\\<instance>\\Device Parameters\\Disk"
        valueName: CacheIsPowerProtected
        value: 1
        valueType: DWord

  - id: storage.disable-indexing
    name: "Disable Windows Search Indexing Service"
    description: "Disable the Windows Search indexing service (WSearch) which continuously scans and indexes file contents in the background"
    rationale: "The Windows Search indexer consumes disk I/O, CPU, and memory by continuously crawling files for content indexing. On gaming systems, disabling it eliminates background I/O contention."
    risk: low
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 3
    blockedProfiles: []
    serviceChanges:
      - name: WSearch
        startupType: Disabled
